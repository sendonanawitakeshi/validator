name: Update Operator Report

on:
  repository_dispatch:
    types: [update-report]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write report
        env:
          REPORT_JSON: ${{ toJSON(github.event.client_payload.report) }}
        run: |
          echo "$REPORT_JSON" | python3 -m json.tool > operator_report.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add operator_report.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "operator report (via Action)"
          git push
